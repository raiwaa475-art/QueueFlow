<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Circle / Clock Body -->
  <circle cx="50" cy="50" r="45" stroke="url(#logoGradient)" stroke-width="8" fill="white" filter="url(#shadow)" />
  
  <!-- Flow Arrow / Clock Hand -->
  <path d="M50 20 V50 L75 65" stroke="url(#logoGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Dynamic Flow Element -->
  <path d="M70 30 C80 40 80 60 70 70" stroke="url(#logoGradient)" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  
  <!-- Center Dot -->
  <circle cx="50" cy="50" r="4" fill="url(#logoGradient)" />
</svg>
